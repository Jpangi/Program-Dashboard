{% extends 'base.html' %}  
{% load static %} 
{% block content %}


<h2>Are you sure you want to delete {{ program.name }}?</h2>

<form action="" method="post" class="form">
  {% csrf_token %}
  <a href="{% url 'program_detail' program.id %}" class="btn secondary">Cancel</a>
  <button type="submit" class="btn danger">Yes - Delete!</button>
</form>

{% endblock %}
